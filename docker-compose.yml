services:
  postgres:
    image: postgres:15-alpine
    container_name: psp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-podcast_summarizer}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: psp-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: psp-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: psp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    # gpu support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psp-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-podcast_summarizer}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data/audio:/app/data/audio
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  api-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      SECRET_KEY: ${SECRET_KEY:-test-secret-key}
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    command: pytest --cov=app --cov-report=term-missing

  worker-high:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psp-worker-high
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-podcast_summarizer}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data/audio:/app/data/audio
    command: celery -A app.worker.celery_app worker --loglevel=info -E --queues=high --concurrency=4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  worker-low:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psp-worker-low
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-podcast_summarizer}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data/audio:/app/data/audio
    command: celery -A app.worker.celery_app worker --loglevel=info -E --queues=low --concurrency=2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  flower:
    image: mher/flower:latest
    container_name: psp-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    command: celery --broker=redis://redis:6379/0 flower --port=5555 --basic_auth=admin:${FLOWER_PASSWORD:-admin}
    depends_on:
      redis:
        condition: service_healthy

networks:
  default:
    name: psp-network
